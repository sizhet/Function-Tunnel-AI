.neutral { fill:#fefce8; stroke:#a16207; stroke-width:2; rx:16; }
.arrow { stroke:#334155; stroke-width:2.5; fill:none; marker-end:url(#arrow); }
.line { stroke:#64748b; stroke-width:2; fill:none; }
</style>
<marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#334155"/></marker>

.label { font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight:600; fill:#111827; }
.small { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill:#334155; }
.box { fill:#f8fafc; stroke:#334155; stroke-width:2; rx:16; }

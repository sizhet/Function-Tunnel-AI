<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
<defs>
<style>
.title { font-family: Arial, Helvetica, sans-serif; font-size: 34px; font-weight: 700; fill:#111827; }
.subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill:#475569; }
.label { font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight:600; fill:#111827; }
.small { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill:#334155; }
.box { fill:#f8fafc; stroke:#334155; stroke-width:2; rx:16; }
.core { fill:#eef2ff; stroke:#3730a3; stroke-width:3; rx:22; }
.good { fill:#ecfdf5; stroke:#047857; stroke-width:2; rx:16; }
.bad { fill:#fff1f2; stroke:#be123c; stroke-width:2; rx:16; }
.neutral { fill:#fefce8; stroke:#a16207; stroke-width:2; rx:16; }
.arrow { stroke:#334155; stroke-width:2.5; fill:none; marker-end:url(#arrow); }
.line { stroke:#64748b; stroke-width:2; fill:none; }
</style>
<marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#334155"/></marker>
</defs>
<rect width="100%" height="100%" fill="white"/>
<text x="700" y="55" text-anchor="middle" class="title">Fig-009 — Function Tunnel Neutrality Principle</text>
<rect x="510" y="130" width="380" height="100" class="core"/>
<text x="700.0" y="172.0" text-anchor="middle" class="label">Function Tunnel</text>
<text x="700.0" y="202.0" text-anchor="middle" class="small">structural phenomenon, not moral label</text>
<path d="M700 230 L360 360" class="arrow"/><path d="M700 230 L1040 360" class="arrow"/>
<rect x="150" y="360" width="420" height="100" class="good"/>
<text x="360.0" y="402.0" text-anchor="middle" class="label">Positive Social Effect</text>
<text x="360.0" y="432.0" text-anchor="middle" class="small">education • healthcare • science • resilience</text>
<rect x="830" y="360" width="420" height="100" class="bad"/>
<text x="1040.0" y="402.0" text-anchor="middle" class="label">Harmful Social Effect</text>
<text x="1040.0" y="432.0" text-anchor="middle" class="small">addiction • manipulation • polarization • escalation</text>
<rect x="430" y="585" width="540" height="130" class="neutral"/>
<text x="700.0" y="642.0" text-anchor="middle" class="label">Evaluation Criteria</text>
<text x="700.0" y="668.0" text-anchor="middle" class="small"><tspan x="700.0" dy="0">objectives • governance • transparency</tspan><tspan x="700.0" dy="18">reversibility • autonomy • net social impact</tspan></text>
<path d="M360 460 L600 585" class="arrow"/><path d="M1040 460 L800 585" class="arrow"/>
<text x="700" y="800" text-anchor="middle" class="subtitle">The existence of a tunnel is not enough for judgment; its consequences and governance matter.</text>
</svg>
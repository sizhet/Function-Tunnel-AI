<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
<defs>
<style>
.title { font-family: Arial, Helvetica, sans-serif; font-size: 34px; font-weight: 700; fill:#111827; }
.subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill:#475569; }
.label { font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight:600; fill:#111827; }
.small { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill:#334155; }
.box { fill:#f8fafc; stroke:#334155; stroke-width:2; rx:16; }
.core { fill:#eef2ff; stroke:#3730a3; stroke-width:3; rx:22; }
.good { fill:#ecfdf5; stroke:#047857; stroke-width:2; rx:16; }
.bad { fill:#fff1f2; stroke:#be123c; stroke-width:2; rx:16; }
.neutral { fill:#fefce8; stroke:#a16207; stroke-width:2; rx:16; }
.arrow { stroke:#334155; stroke-width:2.5; fill:none; marker-end:url(#arrow); }
.line { stroke:#64748b; stroke-width:2; fill:none; }
</style>
<marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#334155"/></marker>
</defs>
<rect width="100%" height="100%" fill="white"/>
<text x="700" y="55" text-anchor="middle" class="title">Fig-002 — Tunnel Formation Principle</text>
<rect x="80" y="220" width="220" height="90" class="box"/>
<text x="190.0" y="257.0" text-anchor="middle" class="label">Random Exploration</text>
<text x="190.0" y="287.0" text-anchor="middle" class="small">many possible paths</text>
<path d="M300 265 L335 265" class="arrow"/>
<rect x="340" y="220" width="220" height="90" class="box"/>
<text x="450.0" y="257.0" text-anchor="middle" class="label">Asymmetry</text>
<text x="450.0" y="287.0" text-anchor="middle" class="small">small initial differences</text>
<path d="M560 265 L595 265" class="arrow"/>
<rect x="600" y="220" width="220" height="90" class="box"/>
<text x="710.0" y="257.0" text-anchor="middle" class="label">Feedback</text>
<text x="710.0" y="287.0" text-anchor="middle" class="small">successful paths amplify</text>
<path d="M820 265 L855 265" class="arrow"/>
<rect x="860" y="220" width="220" height="90" class="box"/>
<text x="970.0" y="257.0" text-anchor="middle" class="label">Resource Flow</text>
<text x="970.0" y="287.0" text-anchor="middle" class="small">energy, matter, capital, attention</text>
<path d="M1080 265 L1115 265" class="arrow"/>
<rect x="1120" y="220" width="220" height="90" class="box"/>
<text x="1230.0" y="257.0" text-anchor="middle" class="label">Historical Accumulation</text>
<text x="1230.0" y="287.0" text-anchor="middle" class="small">path memory and lock-in</text>
<path d="M700 330 L700 480" class="arrow"/>
<rect x="470" y="500" width="460" height="140" class="core"/>
<text x="700.0" y="562.0" text-anchor="middle" class="label">Function Tunnel</text>
<text x="700.0" y="588.0" text-anchor="middle" class="small"><tspan x="700.0" dy="0">stable, reinforced, feasible</tspan><tspan x="700.0" dy="18">evolutionary corridor</tspan></text>
<text x="700" y="720" text-anchor="middle" class="subtitle">Function Tunnels do not require deliberate design; they emerge when structure reinforces path selection.</text>
</svg>